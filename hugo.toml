baseURL = "https://veeeringoff.github.io/"
languageCode = "en-us"
title = "Veering Optimally"
theme = "till"

enableRobotsTXT = true
enableEmoji = true

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]
    [markup.goldmark.renderer]
      unsafe = true


[taxonomies]

[params]
  description = "Notes on ML, systems, and learning the hard way"
  math = true
  showGraph = false

  [params.author]
    name = "Veeresh"


[caches]
  [caches.images]
    dir = ':cacheDir/images'